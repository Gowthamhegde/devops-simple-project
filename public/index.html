<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Release Board Lab</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="band top-band">
      <div class="shell topbar">
        <div>
          <p class="eyebrow">DevOps Practice Target</p>
          <h1 id="appName">Release Board Lab</h1>
        </div>
        <div class="header-meta">
          <div class="meta-block">
            <span class="meta-label">Environment</span>
            <strong id="environmentBadge">local</strong>
          </div>
          <div class="meta-block">
            <span class="meta-label">Release</span>
            <strong id="releaseBadge">0.1.0</strong>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="band action-band">
        <div class="shell">
          <form id="itemForm" class="composer">
            <div class="field wide">
              <label for="title">Work item</label>
              <input id="title" name="title" type="text" maxlength="90" placeholder="Add a release or deployment task" required />
            </div>
            <div class="field">
              <label for="service">Service</label>
              <input id="service" name="service" type="text" maxlength="40" placeholder="api" />
            </div>
            <div class="field">
              <label for="environment">Target</label>
              <select id="environment" name="environment">
                <option value="local">local</option>
                <option value="staging" selected>staging</option>
                <option value="production">production</option>
              </select>
            </div>
            <div class="field">
              <label for="owner">Owner</label>
              <input id="owner" name="owner" type="text" maxlength="40" placeholder="team member" />
            </div>
            <div class="field action-field">
              <label class="ghost-label">Create</label>
              <button type="submit" class="primary-button">Add item</button>
            </div>
          </form>
          <p id="statusLine" class="status-line" aria-live="polite"></p>
        </div>
      </section>

      <section class="band summary-band">
        <div class="shell summary-grid" id="summaryGrid"></div>
      </section>

      <section class="band board-band">
        <div class="shell board-grid">
          <div class="panel">
            <div class="panel-head">
              <h2>Board</h2>
              <span id="itemCount" class="pill">0 items</span>
            </div>
            <div class="lane-grid" id="laneGrid"></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h2>Checks</h2>
            </div>
            <div class="checks" id="checksPanel"></div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
