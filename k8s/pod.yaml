apiVersion: v1
kind: Pod
metadata:
  name: release-board-pod
  namespace: release-board
  labels:
    app: release-board-lab
spec:
  containers:
    - name: release-board
      image: release-board-lab:latest
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 3000
          protocol: TCP
      env:
        - name: APP_NAME
          value: "Release Board Lab"
        - name: ENVIRONMENT
          value: "production"
        - name: PORT
          value: "3000"
        - name: HOST
          value: "0.0.0.0"
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 3000
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /readyz
          port: 3000
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 3
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
  restartPolicy: Always
